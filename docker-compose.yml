version: '3.8'

services:
  bunkerm:
    build:
      context: .
      dockerfile: Dockerfile.next
    ports:
      - "1900:1900"  # MQTT broker
      - "2000:2000"  # Web UI
    volumes:
      - next_data:/nextjs/data          # Persistent: user accounts & app data
      - mosquitto_data:/var/lib/mosquitto  # Persistent: broker clients & ACLs
      - history_data:/var/lib/history      # Persistent: message history (SQLite)
    environment:
      # ── MQTT broker ─────────────────────────────────────────────────────────
      - MQTT_BROKER=localhost
      - MQTT_PORT=1900
      - MQTT_USERNAME=${MQTT_USERNAME:-mqttadmin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-S6sNHgY28uvi}
      - MOSQUITTO_IP=127.0.0.1
      - MOSQUITTO_PORT=1900
      # ── Security — CHANGE THESE in production ───────────────────────────────
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret_replace_in_production}
      - API_KEY=${API_KEY:-default_api_key_replace_in_production}
      - AUTH_SECRET=${AUTH_SECRET:-bunkerm-secret-please-change-in-production}
      # Set COOKIE_SECURE=true ONLY when running behind HTTPS.
      # Leaving it unset (default false) is correct for plain HTTP deployments.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # ── App settings ────────────────────────────────────────────────────────
      - FRONTEND_URL=http://localhost:2000
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      - RATE_LIMIT_PER_MINUTE=100
      # ── Logging ─────────────────────────────────────────────────────────────
      - LOG_LEVEL=INFO
      - API_LOG_FILE=/var/log/api/api_activity.log
      - BROKER_LOG_PATH=/var/log/mosquitto/mosquitto.log
      - CLIENT_LOG_PATH=/var/log/api/api_activity.log
      # ── Internal paths (baked into image — do not change) ───────────────────
      - DYNSEC_PATH=/var/lib/mosquitto/dynamic-security.json
      - MAX_UPLOAD_SIZE=10485760
      - SSL_CERT_PATH=/app/certs/cert.pem
      - SSL_KEY_PATH=/app/certs/key.pem
      # ── BunkerAI (optional — leave blank to keep agent dormant) ─────────────
      - BUNKERAI_API_KEY=${BUNKERAI_API_KEY:-}
      - BUNKERAI_WS_URL=${BUNKERAI_WS_URL:-wss://api.bunkerai.dev/connect}
      - BUNKERAI_CLOUD_URL=${BUNKERAI_CLOUD_URL:-https://api.bunkerai.dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  next_data:
    driver: local
  mosquitto_data:
    driver: local
  history_data:
    driver: local
