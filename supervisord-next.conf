[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:mosquitto]
command=/usr/sbin/mosquitto -c /etc/mosquitto/mosquitto.conf
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/mosquitto.err.log
stdout_logfile=/var/log/supervisor/mosquitto.out.log
user=mosquitto
priority=10

[program:monitor-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 1001
directory=/app/monitor
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/monitor-api.err.log
stdout_logfile=/var/log/supervisor/monitor-api.out.log
user=root
environment=PYTHONPATH="/app/monitor"
priority=20

[program:clientlogs]
command=/opt/venv/bin/python /app/clientlogs/main.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/clientlogs.err.log
stdout_logfile=/var/log/clientlogs.log
user=root
priority=20

[program:dynsec-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 1000
directory=/app/dynsec
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/dynsec-api.err.log
stdout_logfile=/var/log/supervisor/dynsec-api.out.log
user=root
environment=PYTHONPATH="/app/dynsec"
priority=20

[program:config-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 1005
directory=/app/config
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/config-api.err.log
stdout_logfile=/var/log/supervisor/config-api.out.log
user=root
environment=PYTHONPATH="/app/config",DYNSEC_JSON_PATH="/var/lib/mosquitto/dynamic-security.json",DYNSEC_BACKUP_DIR="/tmp/dynsec_backups",MOSQUITTO_CONF_PATH="/etc/mosquitto/mosquitto.conf",MOSQUITTO_BACKUP_DIR="/tmp/mosquitto_backups"
priority=20

[program:aws-bridge-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 1003
directory=/app/aws-bridge
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/aws-bridge-api.err.log
stdout_logfile=/var/log/supervisor/aws-bridge-api.out.log
user=root
environment=PYTHONPATH="/app/aws-bridge"
priority=20

[program:azure-bridge-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 1004
directory=/app/azure-bridge
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/azure-bridge-api.err.log
stdout_logfile=/var/log/supervisor/azure-bridge-api.out.log
user=root
environment=PYTHONPATH="/app/azure-bridge"
priority=20

[program:agent-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 1006
directory=/app/agent-api
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/agent-api.err.log
stdout_logfile=/var/log/supervisor/agent-api.out.log
user=root
environment=PYTHONPATH="/app",API_KEY="%(ENV_API_KEY)s",MQTT_USERNAME="%(ENV_MQTT_USERNAME)s",MQTT_PASSWORD="%(ENV_MQTT_PASSWORD)s"
priority=24

[program:history-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 1007
directory=/app/history-api
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/history-api.err.log
stdout_logfile=/var/log/supervisor/history-api.out.log
user=root
environment=PYTHONPATH="/app/history-api",API_KEY="%(ENV_API_KEY)s",MQTT_USERNAME="%(ENV_MQTT_USERNAME)s",MQTT_PASSWORD="%(ENV_MQTT_PASSWORD)s"
priority=25

[program:smart-anomaly]
command=/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8100
directory=/app/smart-anomaly
autostart=true
autorestart=true
priority=25
stdout_logfile=/var/log/supervisor/smart-anomaly.log
stderr_logfile=/var/log/supervisor/smart-anomaly.log
environment=PYTHONPATH="/app/smart-anomaly",BUNKERM_API_KEY="%(ENV_API_KEY)s"

[program:connector-agent]
command=/opt/venv/bin/python /app/connector_agent/main.py
directory=/app
autostart=true
autorestart=false
startsecs=0
exitcodes=0
priority=26
stdout_logfile=/var/log/supervisor/connector-agent.log
stderr_logfile=/var/log/supervisor/connector-agent.log
environment=PYTHONPATH="/app",BUNKERAI_API_KEY="%(ENV_BUNKERAI_API_KEY)s",BUNKERAI_WS_URL="%(ENV_BUNKERAI_WS_URL)s",API_KEY="%(ENV_API_KEY)s",MQTT_USERNAME="%(ENV_MQTT_USERNAME)s",MQTT_PASSWORD="%(ENV_MQTT_PASSWORD)s"

[program:nextjs-frontend]
command=node /nextjs/server.js
directory=/nextjs
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/nextjs.err.log
stdout_logfile=/var/log/supervisor/nextjs.out.log
user=root
environment=PORT="3000",HOSTNAME="127.0.0.1",NODE_ENV="production"
priority=25

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log
user=root
priority=30
